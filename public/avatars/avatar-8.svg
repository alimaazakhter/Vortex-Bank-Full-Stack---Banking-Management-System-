<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-growth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#15803d" />
    </linearGradient>
    <linearGradient id="glow-growth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01" />
    </linearGradient>
  </defs>
  <rect width="120" height="120" fill="url(#bg-growth)" />
  <!-- Area under curve -->
  <path d="M20,95 L20,75 L42,58 L68,68 L98,30 L98,95 Z" fill="url(#glow-growth)" />
  <!-- Grid Lines -->
  <line x1="20" y1="95" x2="100" y2="95" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1.5" />
  <line x1="20" y1="70" x2="100" y2="70" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" stroke-dasharray="3 3" />
  <line x1="20" y1="45" x2="100" y2="45" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" stroke-dasharray="3 3" />
  <!-- Trend Line -->
  <path d="M20,75 L42,58 L68,68 L98,30" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Arrow Head -->
  <polyline points="84,30 98,30 98,44" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Dots -->
  <circle cx="20" cy="75" r="3" fill="#10b981" stroke="#ffffff" stroke-width="1.5" />
  <circle cx="42" cy="58" r="3" fill="#10b981" stroke="#ffffff" stroke-width="1.5" />
  <circle cx="68" cy="68" r="3" fill="#10b981" stroke="#ffffff" stroke-width="1.5" />
  <circle cx="98" cy="30" r="4.5" fill="#34d399" stroke="#ffffff" stroke-width="2" />
</svg>
