<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-pot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#db2777" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="coin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>
  <rect width="120" height="120" fill="url(#bg-pot)" />
  <!-- Floating coin -->
  <ellipse cx="60" cy="24" rx="7" ry="5" fill="url(#coin-grad)" stroke="#ffffff" stroke-width="1" />
  <line x1="60" y1="21" x2="60" y2="27" stroke="#ffffff" stroke-width="1.5" />
  <!-- Piggy bank body -->
  <ellipse cx="60" cy="66" rx="32" ry="24" fill="#ffffff" fill-opacity="0.9" />
  <!-- Piggy bank snout -->
  <rect x="86" y="58" width="10" height="12" rx="3" fill="#ffffff" fill-opacity="0.9" />
  <circle cx="91" cy="62" r="1.5" fill="#db2777" />
  <circle cx="91" cy="66" r="1.5" fill="#db2777" />
  <!-- Piggy bank ears -->
  <polygon points="40,48 48,32 54,44" fill="#ffffff" fill-opacity="0.9" />
  <polygon points="44,48 49,36 53,45" fill="#f472b6" fill-opacity="0.5" />
  <!-- Piggy bank eye -->
  <circle cx="74" cy="54" r="2.5" fill="#1e293b" />
  <!-- Piggy bank legs -->
  <rect x="42" y="84" width="10" height="14" rx="2" fill="#ffffff" fill-opacity="0.9" />
  <rect x="68" y="84" width="10" height="14" rx="2" fill="#ffffff" fill-opacity="0.9" />
  <!-- Coin slot -->
  <line x1="52" y1="48" x2="68" y2="48" stroke="#db2777" stroke-width="3" stroke-linecap="round" />
</svg>
