<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c1d95" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
    <linearGradient id="glass-card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="chip-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>
  <rect width="120" height="120" fill="url(#bg-card)" />
  <!-- Card reflection glow -->
  <circle cx="90" cy="30" r="30" fill="#a78bfa" opacity="0.3" filter="blur(15px)" />
  <!-- Card body -->
  <g transform="rotate(-12, 60, 60)">
    <!-- Shadow -->
    <rect x="27" y="37" width="66" height="46" rx="6" fill="rgba(0, 0, 0, 0.25)" />
    <!-- Main body -->
    <rect x="25" y="35" width="66" height="46" rx="6" fill="url(#glass-card-grad)" stroke="rgba(255, 255, 255, 0.25)" stroke-width="1.5" />
    <!-- Chip -->
    <rect x="33" y="45" width="10" height="8" rx="1.5" fill="url(#chip-grad)" />
    <!-- Card Lines -->
    <rect x="33" y="62" width="25" height="3" rx="1" fill="#ffffff" fill-opacity="0.6" />
    <rect x="33" y="68" width="15" height="3" rx="1" fill="#ffffff" fill-opacity="0.4" />
    <!-- Mastercard Circles -->
    <circle cx="76" cy="68" r="5" fill="#f87171" fill-opacity="0.8" />
    <circle cx="81" cy="68" r="5" fill="#fbbf24" fill-opacity="0.8" />
  </g>
</svg>
