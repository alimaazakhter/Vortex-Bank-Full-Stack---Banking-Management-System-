<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="shield-highlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="120" height="120" fill="url(#bg-shield)" />
  <circle cx="60" cy="60" r="46" fill="none" stroke="rgba(255, 255, 255, 0.12)" stroke-width="1.5" />
  <!-- Shield outline shadow -->
  <path d="M60,25 C75,25 84,28 84,38 C84,62 68,82 60,94 C52,82 36,62 36,38 C36,28 45,25 60,25 Z" fill="none" stroke="rgba(0, 0, 0, 0.2)" stroke-width="5" />
  <!-- Shield Body -->
  <path d="M60,25 C75,25 84,28 84,38 C84,62 68,82 60,94 C52,82 36,62 36,38 C36,28 45,25 60,25 Z" fill="url(#shield-highlight)" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round" />
  <!-- Inner Shield division -->
  <path d="M60,27 L60,92" stroke="rgba(255, 255, 255, 0.2)" stroke-width="2" />
  <!-- Trust Icon checkmark inside -->
  <path d="M48,56 L56,64 L72,48" fill="none" stroke="#10b981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
</svg>
